name: Equinox CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Lint Rust contracts
  # ─────────────────────────────────────────────
  lint-contracts:
    name: Lint Rust contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        run: cd contracts && cargo fmt --all -- --check

      - name: Clippy
        run: cd contracts && cargo clippy --target wasm32-unknown-unknown -- -D warnings

  # ─────────────────────────────────────────────
  # JOB 2 — Test Soroban contracts
  # ─────────────────────────────────────────────
  test-contracts:
    name: Test Soroban contracts
    runs-on: ubuntu-latest
    needs: lint-contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libssl-dev build-essential

      - name: Install soroban-cli
        run: cargo install --locked soroban-cli

      - name: Run all contract tests
        run: cd contracts && cargo test --all -- --nocapture

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: contracts/target/

  # ─────────────────────────────────────────────
  # JOB 3 — Build Soroban WASM
  # ─────────────────────────────────────────────
  build-contracts:
    name: Build Soroban WASM
    runs-on: ubuntu-latest
    needs: test-contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build equinox-token
        run: cd contracts/equinox-token && cargo build --target wasm32-unknown-unknown --release

      - name: Build equinox-pool
        run: cd contracts/equinox-pool && cargo build --target wasm32-unknown-unknown --release

      - name: Build equinox-bridge
        run: cd contracts/equinox-bridge && cargo build --target wasm32-unknown-unknown --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm

  # ─────────────────────────────────────────────
  # JOB 4 — Lint + typecheck frontend
  # ─────────────────────────────────────────────
  lint-frontend:
    name: Lint + typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - run: cd frontend && npm run lint

      - run: cd frontend && npx tsc --noEmit

      - run: cd frontend && npm test

  # ─────────────────────────────────────────────
  # JOB 5 — Build Next.js frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build Next.js frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    env:
      NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
      NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_SOROBAN_RPC: https://soroban-testnet.stellar.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next/

  # ─────────────────────────────────────────────
  # JOB 6 — Deploy preview to Vercel (PRs only)
  # ─────────────────────────────────────────────
  deploy-preview:
    name: Deploy preview to Vercel
    runs-on: ubuntu-latest
    needs: [build-contracts, build-frontend]
    # PR-only. Requires the VERCEL_TOKEN repo secret; the CI badge tracks
    # pushes to main (where this job is skipped), so a missing token never
    # turns the main-branch badge red.
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install -g vercel

      - name: Deploy preview
        id: deploy
        run: |
          cd frontend
          PREVIEW_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes)
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ✅ Preview Deployed',
                '',
                `**URL:** ${{ steps.deploy.outputs.url }}`,
                '**Network:** Stellar Testnet',
                `**Commit:** ${context.sha.substring(0,7)}`
              ].join('\n')
            })


